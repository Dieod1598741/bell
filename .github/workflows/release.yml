name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          
      - name: Create .env from secrets
        run: |
          echo "NEON_DB_HOST=${{ secrets.NEON_DB_HOST }}" > backend/.env
          echo "NEON_DB_NAME=${{ secrets.NEON_DB_NAME }}" >> backend/.env
          echo "NEON_DB_USER=${{ secrets.NEON_DB_USER }}" >> backend/.env
          echo "NEON_DB_PASSWORD=${{ secrets.NEON_DB_PASSWORD }}" >> backend/.env
          echo "NEON_DB_PORT=${{ secrets.NEON_DB_PORT }}" >> backend/.env
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
          cd ..
          
      - name: Build with PyInstaller
        run: |
          pyinstaller --clean Bell.spec
          
      - name: Create DMG
        run: |
          cd dist
          hdiutil create -volname "Bell" -srcfolder "Bell.app" -ov -format UDZO "Bell.dmg"
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bell-macos
          path: dist/Bell.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          
      - name: Create .env from secrets
        run: |
          echo "NEON_DB_HOST=${{ secrets.NEON_DB_HOST }}" > backend/.env
          echo "NEON_DB_NAME=${{ secrets.NEON_DB_NAME }}" >> backend/.env
          echo "NEON_DB_USER=${{ secrets.NEON_DB_USER }}" >> backend/.env
          echo "NEON_DB_PASSWORD=${{ secrets.NEON_DB_PASSWORD }}" >> backend/.env
          echo "NEON_DB_PORT=${{ secrets.NEON_DB_PORT }}" >> backend/.env
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
          cd ..
          
      - name: Build with PyInstaller
        run: |
          pyinstaller --clean Bell.spec
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bell-windows
          path: dist/Bell/Bell.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            bell-macos/Bell.dmg
            bell-windows/Bell.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
